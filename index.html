<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新西兰南岛经典环线 · 定制行程方案</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

:root{
  --navy:#16233F;
  --navy-2:#223257;
  --gold:#B98D3E;
  --gold-soft:#E4C98A;
  --paper:#F6F1E4;
  --ink:#201C16;
  --stamp:#8B3A2B;
  --line:#D8CBAF;
  --muted:#8a8168;
  font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:
    radial-gradient(rgba(228,201,138,0.10) 1px, transparent 1.4px) 0 0/26px 26px,
    var(--navy);
  padding:32px 16px 80px;
}
.doc{
  max-width:640px;
  margin:0 auto;
  background:var(--paper);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 30px 60px rgba(0,0,0,0.35);
}
/* editable inputs blend into the document */
input, textarea{
  font-family:inherit;
  border:none;
  background:transparent;
  color:inherit;
  width:100%;
  padding:2px 0;
}
input:focus, textarea:focus{
  outline:none;
  background:rgba(185,141,62,0.10);
  border-radius:4px;
}
input::placeholder, textarea::placeholder{color:rgba(255,255,255,0.35);}
.paper input::placeholder, .paper textarea::placeholder{color:#b7ac8e;}
textarea{resize:none;overflow:hidden;line-height:1.5;}

/* ---------- COVER ---------- */
.cover{
  background:var(--navy);
  color:var(--paper);
  padding:30px 28px 26px;
  position:relative;
  overflow:hidden;
}
.cover-art{
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
}
.cover .eyebrow,
.cover .dest-input,
.cover .tagline,
.cover .chips{
  position:relative;
  z-index:1;
}
.cover .eyebrow{
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:.28em;
  color:var(--gold-soft);
  text-transform:uppercase;
}
.cover .dest-input{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:38px;
  margin:10px 0 4px;
  color:#fff;
}
.cover .dest-input::placeholder{color:rgba(255,255,255,0.4);}
.cover .tagline{
  font-size:14px;
  color:#B9C0D4;
  font-style:italic;
}
.visa-stamp{
  position:absolute;
  top:26px;right:26px;
  width:68px;height:68px;
  border:1.5px dashed rgba(228,201,138,0.55);
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transform:rotate(-10deg);
  z-index:1;
  color:var(--gold-soft);
  font-family:'Space Mono',monospace;
  text-align:center;
  line-height:1.25;
}
.visa-stamp .top{font-size:7px;letter-spacing:.12em;opacity:.85;}
.visa-stamp .mid{font-size:13px;font-weight:700;margin:1px 0;}
.visa-stamp .bot{font-size:6.5px;letter-spacing:.1em;opacity:.75;}
.cover .flourish{
  font-size:10px;
  letter-spacing:.15em;
  color:var(--gold);
  opacity:.6;
  margin-bottom:6px;
}
.cover-photo{
  position:absolute;inset:0;z-index:0;
  display:none;
}
.cover-photo img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.cover-photo-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(22,35,63,.32) 0%, rgba(22,35,63,.55) 55%, rgba(22,35,63,.85) 100%);
}
.cover-photo-ctrl{
  position:relative;z-index:1;
  display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;
}
.mini-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--gold-soft);
  border:1.5px dashed rgba(228,201,138,0.55);
  border-radius:16px;padding:6px 12px;
  cursor:pointer;background:rgba(255,255,255,0.06);
  font-family:inherit;
}
.mini-btn.ghost{border-style:solid;border-color:rgba(228,201,138,0.3);opacity:.8;}
.chips{
  display:flex;
  gap:10px;
  margin-top:20px;
  flex-wrap:wrap;
}
.chip{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(228,201,138,0.35);
  border-radius:20px;
  padding:7px 14px;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12.5px;
}
.chip .ic{color:var(--gold-soft);font-size:13px;}
.chip input{width:auto;min-width:36px;color:#fff;font-weight:600;text-align:left;}

/* ---------- TIMELINE / DAYS ---------- */
.days{padding:20px 24px 4px;}
.day{
  display:grid;
  grid-template-columns:44px 1fr;
  gap:14px;
  padding-bottom:22px;
  position:relative;
}
.day .rail{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.day .dot{
  width:34px;height:34px;
  border-radius:50%;
  background:var(--navy);
  color:var(--gold-soft);
  font-family:'Space Mono',monospace;
  font-size:12px;
  font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.day .thread{
  flex:1;
  width:2px;
  background:var(--line);
  margin-top:4px;
}
.day:last-of-type .thread{display:none;}
.day-content{padding-top:2px;}
.day-title-row{display:flex;align-items:center;gap:8px;}
.day-icon{
  font-size:19px;
  flex-shrink:0;
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(185,141,62,0.12);
  border-radius:50%;
}
.day-title{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:18px;
  color:var(--ink);
  flex:1;
  min-width:0;
}
.day-title::placeholder{color:#b7ac8e;}
.activities{margin-top:8px;}
.act-row{
  display:flex;
  gap:8px;
  align-items:flex-start;
  padding:4px 0;
}
.act-row .bullet{color:var(--gold);margin-top:5px;font-size:9px;flex-shrink:0;}
.act-row input{font-size:13.5px;color:#3a3527;}
.rm-act{
  background:none;border:none;color:var(--stamp);
  font-size:14px;cursor:pointer;opacity:.5;flex-shrink:0;
}
.rm-act:hover{opacity:1;}
.add-act{
  font-size:12px;color:#8a6a24;
  background:none;border:none;cursor:pointer;
  padding:4px 0 0 15px;
}
.day-meta{
  display:flex;
  gap:16px;
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
}
.day-photo-wrap{margin-top:10px;}
.day-photo{
  position:relative;border-radius:10px;overflow:hidden;
  border:1px solid var(--line);
}
.day-photo img{display:block;width:100%;max-height:220px;object-fit:cover;}
.rm-photo{
  position:absolute;top:6px;right:6px;
  background:rgba(22,35,63,0.65);color:#fff;border:none;
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  font-size:13px;line-height:1;
}
.add-photo-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:#8a6a24;
  border:1.5px dashed var(--gold);border-radius:8px;
  padding:7px 12px;cursor:pointer;
}
.day-meta .field{display:flex;gap:5px;align-items:center;}
.day-meta input{color:#3a3527;}
.day-actions{
  display:flex;justify-content:flex-end;margin-top:6px;
}
.rm-day{
  background:none;border:none;color:var(--stamp);
  font-size:11px;cursor:pointer;opacity:.55;
}
.rm-day:hover{opacity:1;}

.add-day-wrap{padding:0 24px 20px;}
.add-day{
  width:100%;
  padding:10px;
  border:1.5px dashed var(--gold);
  background:transparent;
  color:#8a6a24;
  border-radius:8px;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
}

.perf{
  position:relative;height:0;
  border-top:2px dashed #C9BB98;
  margin:0 0 0;
}
.perf::before,.perf::after{
  content:'';position:absolute;top:-11px;
  width:22px;height:22px;background:var(--navy);border-radius:50%;
}
.perf::before{left:-11px;}
.perf::after{right:-11px;}
.wave-art{display:block;width:100%;height:20px;background:#EFE7D2;}

/* ---------- PRICE / FOOTER ---------- */
.pricing{
  background:#EFE7D2;
  padding:20px 24px;
}
.pricing .row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;
}
.pricing .label{font-size:13px;color:var(--muted);}
.pricing .amt-wrap{display:flex;align-items:center;gap:2px;font-family:'Space Mono',monospace;font-weight:700;font-size:16px;}
.pricing .amt-wrap input{width:90px;text-align:right;color:var(--ink);}
.pricing .now{color:var(--stamp);}
.pricing .later{color:var(--navy-2);}
.pricing .rate{font-size:11px;color:var(--muted);}

.notes{
  padding:16px 24px 4px;
}
.notes label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.notes textarea{
  font-size:12.5px;color:#4a4430;margin-top:4px;min-height:44px;line-height:1.7;
}

.cta{
  margin:16px 24px 22px;
  border:1.5px dashed var(--gold);
  border-radius:10px;
  padding:14px;
  text-align:center;
  font-size:12.5px;
  color:#8a6a24;
}

.foot-tools{
  display:flex;gap:10px;
  padding:0 24px 24px;
}
.foot-btn{
  flex:1;padding:11px;border-radius:8px;border:none;
  font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;
}
.foot-btn.primary{background:var(--navy);color:var(--gold-soft);}
.foot-btn.primary:hover{background:var(--navy-2);}
.foot-btn.ghost{background:transparent;border:1.5px solid var(--navy);color:var(--navy);}

.hint{
  text-align:center;color:#9aa3bd;font-size:11.5px;
  max-width:640px;margin:14px auto 0;
}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:var(--gold-soft);
  padding:10px 18px;border-radius:8px;font-size:13px;
  font-family:'Space Mono',monospace;
  opacity:0;pointer-events:none;transition:opacity .25s;
  z-index:50;
}
.toast.show{opacity:1;}

.orderbar{
  max-width:640px;margin:0 auto 14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(228,201,138,0.35);
  border-radius:10px;
  padding:10px 14px;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  color:var(--paper);
  font-size:12.5px;
}
.orderbar input{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(228,201,138,0.25);
  border-radius:6px;
  padding:6px 8px;
  color:#fff;
  font-family:'Space Mono',monospace;
  font-size:12px;
  width:140px;
}
.orderbar button{
  background:var(--gold);
  border:none;color:var(--navy);
  font-weight:700;
  padding:7px 12px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  font-family:inherit;
}
.orderbar button.ghost{
  background:transparent;border:1px solid var(--gold-soft);color:var(--gold-soft);
}
.orderbar .status{font-size:11px;color:#B9C0D4;}
</style>
</head>
<body>

<div class="orderbar" id="orderbar">
  <span>取件码：</span>
  <input type="text" id="orderCode" placeholder="自动生成">
  <button id="saveOrderBtn">保存这份方案</button>
  <button class="ghost" id="linkBtn">生成专属链接</button>
  <button class="ghost" id="loadOrderBtn">按取件码打开</button>
  <span class="status" id="orderStatus"></span>
</div>
<div class="doc" id="doc">
  <div class="cover">
    <svg class="cover-art" viewBox="0 0 640 230" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
      <g fill="#E4C98A">
        <circle cx="34" cy="20" r="1.3" opacity=".8"/>
        <circle cx="76" cy="42" r="1" opacity=".45"/>
        <circle cx="118" cy="16" r="1.6" opacity=".7"/>
        <circle cx="168" cy="34" r="1" opacity=".4"/>
        <circle cx="222" cy="18" r="1.2" opacity=".6"/>
        <circle cx="266" cy="46" r="1" opacity=".4"/>
        <circle cx="312" cy="14" r="1.4" opacity=".75"/>
        <circle cx="368" cy="36" r="1" opacity=".45"/>
        <circle cx="416" cy="20" r="1.3" opacity=".65"/>
        <circle cx="462" cy="48" r="1" opacity=".4"/>
        <circle cx="602" cy="18" r="1.3" opacity=".6"/>
        <circle cx="628" cy="52" r="1" opacity=".4"/>
      </g>
      <circle cx="560" cy="40" r="15" fill="#E4C98A" opacity=".15"/>
      <circle cx="560" cy="40" r="15" fill="none" stroke="#E4C98A" stroke-width="1" opacity=".5"/>
      <path d="M0,230 L0,158 L70,104 L128,146 L206,74 L280,152 L344,116 L410,164 L486,90 L556,152 L640,126 L640,230 Z" fill="#1C2C4C" opacity=".65"/>
      <path d="M0,230 L0,188 L96,140 L176,176 L256,132 L336,182 L416,150 L494,190 L578,158 L640,180 L640,230 Z" fill="#223257" opacity=".9"/>
    </svg>
    <div class="cover-photo" id="coverPhoto">
      <img id="coverPhotoImg" alt="封面图">
      <div class="cover-photo-overlay"></div>
    </div>
    <div class="visa-stamp">
      <span class="top">NEW ZEALAND</span>
      <span class="mid">NZ</span>
      <span class="bot">SOUTH ISLE</span>
    </div>
    <div class="eyebrow">Custom Itinerary Proposal</div>
    <input class="dest-input" id="dest" value="新西兰 · 南岛经典环线">
    <div class="flourish">✦ ————————</div>
    <input class="tagline" id="tagline" value="雪山 · 星空 · 峡湾｜7日经典之旅">
    <div class="chips">
      <div class="chip"><span class="ic">◆</span>出行人数 <input id="pax" type="text" placeholder="4" style="width:30px"> 人</div>
      <div class="chip"><span class="ic">◆</span>行程天数 <span id="dayCountLabel">3</span> 天</div>
      <div class="chip"><span class="ic">◆</span>用车 <input id="vehicle" type="text" value="7座自驾/全程司导包车"></div>
      <div class="chip"><span class="ic">◆</span>出行日期 <input id="tripDate" type="text" placeholder="例如：12月10日-16日" style="width:130px"></div>
    </div>
    <div class="cover-photo-ctrl">
      <label class="mini-btn" for="coverPhotoInput">🖼 上传封面图</label>
      <input type="file" id="coverPhotoInput" accept="image/*" style="display:none;">
      <button class="mini-btn ghost" id="coverPhotoRemove" style="display:none;">移除封面图</button>
    </div>
  </div>

  <div class="days" id="days"></div>
  <div class="add-day-wrap"><button class="add-day" id="addDay">+ 添加一天行程</button></div>

  <div class="perf"></div>
  <svg class="wave-art" viewBox="0 0 640 26" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,14 C60,4 100,22 160,12 C220,2 260,20 320,10 C380,0 420,18 480,10 C540,2 580,18 640,8" fill="none" stroke="#C9BB98" stroke-width="1.4" opacity=".55"/>
  </svg>

  <div class="pricing">
    <div class="row">
      <div class="label">行程总价</div>
      <div class="amt-wrap">¥<input id="totalPrice" type="text" value="12800"></div>
    </div>
    <div class="row">
      <div class="label">预付定金<div class="rate">（比例 <input id="depositRate" type="text" value="30" style="width:24px;display:inline;">%）</div></div>
      <div class="amt-wrap now" id="depositAmt">¥3840</div>
    </div>
    <div class="row">
      <div class="label">出发前 / 抵达后支付尾款</div>
      <div class="amt-wrap later" id="balanceAmt">¥8960</div>
    </div>
  </div>

  <div class="notes">
    <label>温馨提示</label>
    <textarea id="notesText" placeholder="例如：以上行程可根据天气及个人喜好微调；建议携带轻便衣物及防晒用品。">南岛昼夜温差大，建议携带冲锋衣/抓绒等分层衣物；自驾需持国际驾照翻译认证件；峡湾游船、缆车等热门项目建议提前预约；具体行程可根据天气及路况微调。</textarea>
  </div>

  <div class="cta">请确认以上行程与报价，回复"确认"后为您发送定金付款链接</div>

  <div class="foot-tools">
    <button class="foot-btn ghost" id="copyBtn">复制文字版</button>
    <button class="foot-btn primary" id="shotHint">📸 长截图分享提示</button>
  </div>
</div>

<p class="hint">封面和每日行程都可以上传自己的照片；填写完成后用手机 / 浏览器的「长截图」功能整页截图，即可发到微信对话框</p>
<div class="toast" id="toast">已复制到剪贴板</div>

<script>
let dayCounter = 0;
let days = [];

function newDay(title, acts, meal, note, img){
  dayCounter++;
  return {
    id: dayCounter,
    title: title || '',
    acts: acts || [''],
    meal: meal || '',
    note: note || '',
    img: img || null
  };
}

days.push(newDay('抵达基督城 · 花园城市漫步', ['接机，入住酒店', '雅芳河畔漫步 / 撑篙体验', '大教堂广场、植物园自由活动'], '不含餐', '接机服务'));
days.push(newDay('基督城 → 蒂卡波湖', ['沿坎特伯雷平原一路南下', '打卡网红「牧羊人教堂」', '夜观南半球星空（蒂卡波为国际暗夜保护区）'], '含早餐', '全程包车'));
days.push(newDay('蒂卡波 → 库克山 → 皇后镇', ['库克山国家公园徒步观景（胡克山谷步道）', '远眺新西兰最高峰', '傍晚抵达皇后镇，入住湖畔酒店'], '含早餐', ''));
days.push(newDay('皇后镇自由活动日', ['天空缆车 + 卢奇滑板车', '瓦卡蒂普湖蒸汽船茶叙庄园', '可选加购：蹦极 / 跳伞 / 喷射快艇'], '含早餐', '极限项目需提前预约'));
days.push(newDay('米尔福德峡湾一日游', ['清晨出发，途经镜湖、荷马隧道', '峡湾游船巡游（观瀑布、海豹、海豚）', '傍晚返回皇后镇'], '含早餐+午餐', '全程约11小时'));
days.push(newDay('皇后镇 → 但尼丁', ['途经中奥塔哥酒庄，可安排品酒', '抵达但尼丁，探访皇家信天翁保护区', '有机会偶遇黄眼企鹅'], '含早餐', ''));
days.push(newDay('但尼丁 → 摩拉基大圆石 → 基督城', ['沿海岸线打卡摩拉基大圆石', '返回基督城，送机', '结束愉快的南岛之旅'], '含早餐', '送机服务'));

function dayIcon(title){
  const t = title || '';
  if(/星空|蒂卡波|暗夜|Tekapo/i.test(t)) return '✨';
  if(/峡湾|米尔福德|游船|Milford/i.test(t)) return '⛵';
  if(/企鹅|信天翁|但尼丁|Dunedin/i.test(t)) return '🐧';
  if(/大圆石|摩拉基|Moeraki/i.test(t)) return '🪨';
  if(/皇后镇|缆车|蹦极|跳伞|Queenstown/i.test(t)) return '🚡';
  if(/酒庄|品酒/i.test(t)) return '🍷';
  if(/库克山|雪山|冰川|徒步|观景/i.test(t)) return '🏔️';
  if(/基督城|花园|抵达/i.test(t)) return '🌷';
  if(/送机|结束/i.test(t)) return '🛫';
  return '🧭';
}

function fileToCompressedDataURL(file, maxW, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderDayPhoto(d){
  const wrap = document.querySelector(`.day-photo-wrap[data-day="${d.id}"]`);
  if(!wrap) return;
  wrap.innerHTML = d.img
    ? `<div class="day-photo"><img src="${d.img}" alt=""><button class="rm-photo" data-id="${d.id}">×</button></div>`
    : `<label class="add-photo-btn">🖼 添加当日照片<input type="file" accept="image/*" data-id="${d.id}" class="day-photo-input" style="display:none;"></label>`;

  const input = wrap.querySelector('.day-photo-input');
  if(input){
    input.addEventListener('change', async e=>{
      const file = e.target.files[0];
      if(!file) return;
      try{
        const day = days.find(x=>x.id==d.id);
        day.img = await fileToCompressedDataURL(file, 900, 0.72);
        renderDayPhoto(day);
      }catch(err){}
    });
  }
  const rm = wrap.querySelector('.rm-photo');
  if(rm){
    rm.addEventListener('click', ()=>{
      const day = days.find(x=>x.id==d.id);
      day.img = null;
      renderDayPhoto(day);
    });
  }
}

let coverImg = null;
function setCoverPhoto(url){
  coverImg = url || null;
  const wrap = document.getElementById('coverPhoto');
  const img = document.getElementById('coverPhotoImg');
  const art = document.querySelector('.cover-art');
  const rmBtn = document.getElementById('coverPhotoRemove');
  if(coverImg){
    img.src = coverImg;
    wrap.style.display = 'block';
    art.style.display = 'none';
    rmBtn.style.display = 'inline-flex';
  }else{
    wrap.style.display = 'none';
    art.style.display = 'block';
    rmBtn.style.display = 'none';
  }
}
document.getElementById('coverPhotoInput').addEventListener('change', async e=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    const dataUrl = await fileToCompressedDataURL(file, 1000, 0.75);
    setCoverPhoto(dataUrl);
  }catch(err){}
});
document.getElementById('coverPhotoRemove').addEventListener('click', ()=> setCoverPhoto(null));

function autoresize(ta){
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function renderDays(){
  const c = document.getElementById('days');
  c.innerHTML = '';
  days.forEach((d, idx)=>{
    const el = document.createElement('div');
    el.className = 'day';
    el.innerHTML = `
      <div class="rail">
        <div class="dot">D${idx+1}</div>
        <div class="thread"></div>
      </div>
      <div class="day-content">
        <div class="day-title-row">
          <span class="day-icon">${dayIcon(d.title)}</span>
          <input class="day-title" data-id="${d.id}" data-field="title" value="${d.title}" placeholder="第${idx+1}天主题，例如：环海骑行 · 日落时分">
        </div>
        <div class="activities" data-acts-for="${d.id}"></div>
        <button class="add-act" data-id="${d.id}">+ 添加一项活动</button>
        <div class="day-photo-wrap" data-day="${d.id}"></div>
        <div class="day-meta">
          <div class="field">🍽 <input data-id="${d.id}" data-field="meal" value="${d.meal}" placeholder="餐食安排"></div>
          <div class="field">🚐 <input data-id="${d.id}" data-field="note" value="${d.note}" placeholder="当日用车/备注"></div>
        </div>
        <div class="day-actions"><button class="rm-day" data-id="${d.id}">删除这一天</button></div>
      </div>
    `;
    c.appendChild(el);
    renderActs(d);
    renderDayPhoto(d);
  });
  document.getElementById('dayCountLabel').textContent = days.length;
  bindDayEvents();
}

function renderActs(d){
  const holder = document.querySelector(`[data-acts-for="${d.id}"]`);
  holder.innerHTML = '';
  d.acts.forEach((a, aidx)=>{
    const row = document.createElement('div');
    row.className = 'act-row';
    row.innerHTML = `
      <span class="bullet">●</span>
      <input type="text" value="${a}" data-day="${d.id}" data-aidx="${aidx}" placeholder="推荐玩法 / 行程安排">
      <button class="rm-act" data-day="${d.id}" data-aidx="${aidx}">×</button>
    `;
    holder.appendChild(row);
  });
  holder.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const day = days.find(x=>x.id==e.target.dataset.day);
      day.acts[+e.target.dataset.aidx] = e.target.value;
    });
  });
  holder.querySelectorAll('.rm-act').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const day = days.find(x=>x.id==e.target.dataset.day);
      day.acts.splice(+e.target.dataset.aidx, 1);
      renderActs(day);
    });
  });
}

function bindDayEvents(){
  document.querySelectorAll('.day-title, .day-meta input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const day = days.find(x=>x.id==e.target.dataset.id);
      day[e.target.dataset.field] = e.target.value;
      if(e.target.classList.contains('day-title')){
        const icon = e.target.closest('.day-title-row').querySelector('.day-icon');
        if(icon) icon.textContent = dayIcon(e.target.value);
      }
    });
  });
  document.querySelectorAll('.add-act').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const day = days.find(x=>x.id==e.target.dataset.id);
      day.acts.push('');
      renderActs(day);
    });
  });
  document.querySelectorAll('.rm-day').forEach(btn=>{
    btn.addEventListener('click', e=>{
      days = days.filter(x=>x.id!=e.target.dataset.id);
      renderDays();
    });
  });
}

document.getElementById('addDay').addEventListener('click', ()=>{
  days.push(newDay('', [''], '', ''));
  renderDays();
});

function recalcPrice(){
  const total = parseFloat(document.getElementById('totalPrice').value.replace(/[^\d.]/g,'')) || 0;
  const rate = parseFloat(document.getElementById('depositRate').value) || 0;
  const deposit = Math.round(total * rate/100);
  const balance = Math.round(total - deposit);
  document.getElementById('depositAmt').innerHTML = '¥' + deposit.toLocaleString('zh-CN');
  document.getElementById('balanceAmt').textContent = '¥' + balance.toLocaleString('zh-CN');
}
document.getElementById('totalPrice').addEventListener('input', recalcPrice);
document.getElementById('depositRate').addEventListener('input', recalcPrice);

document.getElementById('notesText').addEventListener('input', e=>autoresize(e.target));

function buildText(){
  const dest = document.getElementById('dest').value || '目的地';
  const tagline = document.getElementById('tagline').value || '';
  const pax = document.getElementById('pax').value || '--';
  const vehicle = document.getElementById('vehicle').value || '--';
  const tripDate = document.getElementById('tripDate').value || '待定';
  const total = document.getElementById('totalPrice').value || '0';
  const rate = document.getElementById('depositRate').value || '0';
  const depositTxt = document.getElementById('depositAmt').textContent;
  const balanceTxt = document.getElementById('balanceAmt').textContent;

  let lines = [];
  lines.push(`【定制行程方案】${dest}`);
  if(tagline) lines.push(tagline);
  lines.push(`出行日期：${tripDate}　人数：${pax}人　用车：${vehicle}`);
  lines.push('——————————');
  days.forEach((d, idx)=>{
    lines.push(`Day${idx+1}｜${d.title || '未命名'}`);
    d.acts.filter(a=>a.trim()).forEach(a=> lines.push('　· ' + a));
    if(d.meal) lines.push('　餐食：' + d.meal);
    if(d.note) lines.push('　用车/备注：' + d.note);
  });
  lines.push('——————————');
  lines.push(`行程总价：¥${total}`);
  lines.push(`预付定金（${rate}%）：${depositTxt}`);
  lines.push(`出发前/抵达后支付尾款：${balanceTxt}`);
  const notes = document.getElementById('notesText').value;
  if(notes) { lines.push(''); lines.push('温馨提示：' + notes); }
  lines.push('');
  lines.push('请确认以上行程与报价，回复"确认"后为您发送定金付款链接。');
  return lines.join('\n');
}

document.getElementById('copyBtn').addEventListener('click', async ()=>{
  const text = buildText();
  try{ await navigator.clipboard.writeText(text); }
  catch(e){
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
});

document.getElementById('shotHint').addEventListener('click', ()=>{
  const t = document.getElementById('toast');
  t.textContent = 'iPhone：截屏后点预览选"整页" · 安卓：多数机型截屏菜单里有"长截图"';
  t.classList.add('show');
  setTimeout(()=>{t.classList.remove('show'); t.textContent='已复制到剪贴板';}, 3200);
});


function randCode(){
  const dest = (document.getElementById('dest').value||'trip').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'').slice(0,6);
  const t = Date.now().toString(36).slice(-4);
  return (dest||'ORD') + '-' + t;
}

function collectData(){
  return {
    dest: document.getElementById('dest').value,
    tagline: document.getElementById('tagline').value,
    pax: document.getElementById('pax').value,
    vehicle: document.getElementById('vehicle').value,
    tripDate: document.getElementById('tripDate').value,
    days: days,
    totalPrice: document.getElementById('totalPrice').value,
    depositRate: document.getElementById('depositRate').value,
    notes: document.getElementById('notesText').value,
    coverImg: coverImg
  };
}

function applyData(data){
  document.getElementById('dest').value = data.dest || '';
  document.getElementById('tagline').value = data.tagline || '';
  document.getElementById('pax').value = data.pax || '';
  document.getElementById('vehicle').value = data.vehicle || '';
  document.getElementById('tripDate').value = data.tripDate || '';
  document.getElementById('totalPrice').value = data.totalPrice || '';
  document.getElementById('depositRate').value = data.depositRate || '15';
  document.getElementById('notesText').value = data.notes || '';
  days = data.days || days;
  dayCounter = days.reduce((m,d)=>Math.max(m,d.id),0);
  renderDays();
  recalcPrice();
  autoresize(document.getElementById('notesText'));
  setCoverPhoto(data.coverImg || null);
}

async function saveOrder(){
  const status = document.getElementById('orderStatus');
  let code = document.getElementById('orderCode').value.trim();
  if(!code){ code = randCode(); document.getElementById('orderCode').value = code; }
  try{
    const data = collectData();
    await window.storage.set('order:' + code, JSON.stringify(data), true);
    status.textContent = '已保存 · 取件码 ' + code;
  }catch(e){
    status.textContent = '保存失败：请在 Claude 网页 / App 内打开此方案后再试';
  }
}

async function loadOrderByCode(code){
  const status = document.getElementById('orderStatus');
  if(!code) return;
  try{
    const res = await window.storage.get('order:' + code, true);
    if(res && res.value){
      applyData(JSON.parse(res.value));
      status.textContent = '已读取 · 取件码 ' + code;
    }else{
      status.textContent = '没有找到该取件码对应的方案';
    }
  }catch(e){
    status.textContent = '读取失败：请在 Claude 网页 / App 内打开此方案后再试';
  }
}

document.getElementById('saveOrderBtn').addEventListener('click', saveOrder);
document.getElementById('loadOrderBtn').addEventListener('click', ()=>{
  loadOrderByCode(document.getElementById('orderCode').value.trim());
});
document.getElementById('linkBtn').addEventListener('click', async ()=>{
  let code = document.getElementById('orderCode').value.trim();
  if(!code){ await saveOrder(); code = document.getElementById('orderCode').value.trim(); }
  const url = window.location.origin + window.location.pathname + '?order=' + encodeURIComponent(code);
  try{ await navigator.clipboard.writeText(url); }catch(e){}
  document.getElementById('orderStatus').textContent = '专属链接已复制到剪贴板';
});

(function(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('order');
  if(code){
    document.getElementById('orderCode').value = code;
    loadOrderByCode(code);
  }
})();

renderDays();
recalcPrice();
</script>
</body>
</html>
